<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dataset Leaderboards | Awesome Video Anomaly Tasks</title>
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Leaderboards</p>
        <h1>Dataset Leaderboards</h1>
        <p class="subtitle">Choose a dataset to inspect its benchmark notes, links, and compact method comparison table.</p>
      </div>
      <nav aria-label="Primary">
        <a href="../">Home</a>
        <a href="../papers/">Papers</a>
        <a href="../datasets/">Datasets</a>
      </nav>
    </header>

    <main>
      <section class="overview" aria-labelledby="overview-title">
        <div>
          <h2 id="overview-title">Status</h2>
          <p id="load-status" class="status">Loading data</p>
        </div>
        <div id="stats" class="stats" aria-label="Leaderboard statistics"></div>
        <div class="track-panel">
          <h3>Track Coverage</h3>
          <div id="track-bars" class="track-bars"></div>
        </div>
      </section>

      <section class="section-block" aria-labelledby="datasets-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Benchmarks</p>
            <h2 id="datasets-title">Datasets</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Dataset</th>
                <th>Tasks</th>
                <th>Metrics</th>
                <th>Links</th>
              </tr>
            </thead>
            <tbody id="datasets-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script type="module" src="../assets/leaderboard-index.js"></script>
  </body>
</html>
