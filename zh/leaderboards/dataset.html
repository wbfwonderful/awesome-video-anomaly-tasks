<!doctype html>
<html lang="zh-CN" data-base-path="../../">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数据集排行榜 | Awesome Video Anomaly Tasks</title>
    <link rel="stylesheet" href="../../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Dataset Leaderboard</p>
        <h1 id="dataset-title">排行榜</h1>
        <p id="dataset-notes" class="subtitle"></p>
        <p id="load-status" class="status">加载数据中</p>
      </div>
      <nav aria-label="Primary">
        <a href="../">首页</a>
        <a href="./">全部排行榜</a>
        <a href="../papers/">论文</a>
        <a href="../datasets/">数据集</a>
        <a id="language-switch" class="language-link" href="../../leaderboards/dataset.html" data-lang-target="../../leaderboards/dataset.html">English</a>
      </nav>
    </header>

    <main>
      <section class="dataset-summary" aria-label="数据集概览">
        <div>
          <h2>数据集</h2>
          <div id="dataset-meta" class="meta-pills"></div>
        </div>
        <div>
          <h2>链接</h2>
          <div id="dataset-links" class="link-list"></div>
        </div>
        <div id="dataset-provenance" hidden>
          <h2>来源</h2>
          <div id="dataset-provenance-body" class="provenance-list"></div>
        </div>
      </section>

      <section class="section-block leaderboard-section" aria-labelledby="leaderboard-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">可比结果</p>
            <h2 id="leaderboard-title">排行榜</h2>
            <p class="hint">点击分数可打开该结果对应的论文、表格或来源。</p>
          </div>
          <div class="toolbar">
            <div class="filter-control" data-filter="track">
              <span class="filter-label">Track</span>
              <button id="track-filter-button" class="multi-select-button" type="button" aria-expanded="false" aria-controls="track-filter-menu"></button>
              <div id="track-filter-menu" class="multi-select-menu" hidden>
                <input id="track-filter-search" type="search" placeholder="搜索 Track" autocomplete="off">
                <div id="track-filter-options" class="multi-select-options"></div>
              </div>
            </div>
            <div class="filter-control" data-filter="venue">
              <span class="filter-label">Venue</span>
              <button id="venue-filter-button" class="multi-select-button" type="button" aria-expanded="false" aria-controls="venue-filter-menu"></button>
              <div id="venue-filter-menu" class="multi-select-menu" hidden>
                <input id="venue-filter-search" type="search" placeholder="搜索 Venue" autocomplete="off">
                <div id="venue-filter-options" class="multi-select-options"></div>
              </div>
            </div>
            <div class="filter-control" data-filter="variant">
              <span class="filter-label">Variant</span>
              <button id="variant-filter-button" class="multi-select-button" type="button" aria-expanded="false" aria-controls="variant-filter-menu"></button>
              <div id="variant-filter-menu" class="multi-select-menu" hidden>
                <input id="variant-filter-search" type="search" placeholder="搜索 Variant" autocomplete="off">
                <div id="variant-filter-options" class="multi-select-options"></div>
              </div>
            </div>
            <label class="toggle">
              <input id="best-per-paper" type="checkbox">
              每篇论文仅保留最佳结果
            </label>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr id="leaderboard-head"></tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
          </table>
          <p id="leaderboard-empty" class="empty" hidden>没有匹配的结果。</p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script type="module" src="../../assets/dataset-page.js"></script>
  </body>
</html>
