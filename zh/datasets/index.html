<!doctype html>
<html lang="zh-CN" data-base-path="../../">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数据集 | Awesome Video Anomaly Tasks</title>
    <link rel="stylesheet" href="../../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Benchmarks</p>
        <h1>数据集</h1>
        <p class="subtitle">数据集元数据、官方链接、可用指标和排行榜入口。</p>
        <p id="load-status" class="status">加载数据中</p>
      </div>
      <nav aria-label="Primary">
        <a href="../">首页</a>
        <a href="../leaderboards/">排行榜</a>
        <a href="../papers/">论文</a>
        <a class="language-link" href="../../datasets/">English</a>
      </nav>
    </header>

    <main>
      <section id="datasets" class="section-block" aria-labelledby="datasets-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">索引</p>
            <h2 id="datasets-title">原始视频数据集</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>数据集</th>
                <th>任务</th>
                <th>指标</th>
                <th>链接</th>
              </tr>
            </thead>
            <tbody id="datasets-body"></tbody>
          </table>
        </div>
      </section>

      <section id="derived-datasets" class="section-block" aria-labelledby="derived-datasets-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">标注与衍生 Benchmark</p>
            <h2 id="derived-datasets-title">衍生 Benchmark</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Benchmark</th>
                <th>基于</th>
                <th>新增</th>
                <th>新增视频</th>
                <th>任务</th>
                <th>链接</th>
              </tr>
            </thead>
            <tbody id="derived-datasets-body"></tbody>
          </table>
          <p id="derived-datasets-empty" class="empty" hidden>暂无衍生 Benchmark。</p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script type="module" src="../../assets/datasets-page.js"></script>
  </body>
</html>
