<!doctype html>
<html lang="zh-CN" data-base-path="../../">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>论文 | Awesome Video Anomaly Tasks</title>
    <link rel="stylesheet" href="../../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">文献目录</p>
        <h1>论文</h1>
        <p class="subtitle">视频异常检测任务的论文元数据。预印本通过 Venue 表示。</p>
        <p id="load-status" class="status">加载数据中</p>
      </div>
      <nav aria-label="Primary">
        <a href="../">首页</a>
        <a href="../leaderboards/">排行榜</a>
        <a href="../datasets/">数据集</a>
        <a class="language-link" href="../../papers/">English</a>
      </nav>
    </header>

    <main>
      <section id="papers" class="section-block papers-section" aria-labelledby="papers-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">索引</p>
            <h2 id="papers-title">论文</h2>
          </div>
          <div class="toolbar">
            <label>
              搜索
              <input id="paper-query" type="search" placeholder="方法、Venue、标签">
            </label>
            <div class="filter-control" data-filter="venue">
              <span class="filter-label">Venue</span>
              <button id="venue-filter-button" class="multi-select-button" type="button" aria-expanded="false" aria-controls="venue-filter-menu"></button>
              <div id="venue-filter-menu" class="multi-select-menu" hidden>
                <input id="venue-filter-search" type="search" placeholder="搜索 Venue" autocomplete="off">
                <div id="venue-filter-options" class="multi-select-options"></div>
              </div>
            </div>
            <div class="filter-control" data-filter="year">
              <span class="filter-label">年份</span>
              <button id="year-filter-button" class="multi-select-button" type="button" aria-expanded="false" aria-controls="year-filter-menu"></button>
              <div id="year-filter-menu" class="multi-select-menu" hidden>
                <input id="year-filter-search" type="search" placeholder="搜索年份" autocomplete="off">
                <div id="year-filter-options" class="multi-select-options"></div>
              </div>
            </div>
            <div class="filter-control" data-filter="tag">
              <span class="filter-label">标签</span>
              <button id="tag-filter-button" class="multi-select-button" type="button" aria-expanded="false" aria-controls="tag-filter-menu"></button>
              <div id="tag-filter-menu" class="multi-select-menu" hidden>
                <input id="tag-filter-search" type="search" placeholder="搜索标签" autocomplete="off">
                <div id="tag-filter-options" class="multi-select-options"></div>
              </div>
            </div>
            <div class="filter-control" data-filter="presentation">
              <span class="filter-label">报告类型</span>
              <button id="presentation-filter-button" class="multi-select-button" type="button" aria-expanded="false" aria-controls="presentation-filter-menu"></button>
              <div id="presentation-filter-menu" class="multi-select-menu" hidden>
                <input id="presentation-filter-search" type="search" placeholder="搜索报告类型" autocomplete="off">
                <div id="presentation-filter-options" class="multi-select-options"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr id="papers-head">
                <th><button type="button" data-sort="paper">论文</button></th>
                <th><button type="button" data-sort="year">年份</button></th>
                <th><button type="button" data-sort="venue">Venue</button></th>
                <th><button type="button" data-sort="tags">标签</button></th>
                <th>链接</th>
              </tr>
            </thead>
            <tbody id="papers-body"></tbody>
          </table>
          <p id="papers-empty" class="empty" hidden>没有匹配的论文。</p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script type="module" src="../../assets/papers-page.js"></script>
  </body>
</html>
