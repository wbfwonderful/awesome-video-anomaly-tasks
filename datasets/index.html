<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Datasets | Awesome Video Anomaly Tasks</title>
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Benchmarks</p>
        <h1>Datasets</h1>
        <p class="subtitle">Dataset metadata, official links, available metrics, and leaderboard entry points.</p>
        <p id="load-status" class="status">Loading data</p>
      </div>
      <nav aria-label="Primary">
        <a href="../">Home</a>
        <a href="../leaderboards/">Leaderboards</a>
        <a href="../papers/">Papers</a>
      </nav>
    </header>

    <main>
      <section id="datasets" class="section-block" aria-labelledby="datasets-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Index</p>
            <h2 id="datasets-title">Datasets</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Dataset</th>
                <th>Tasks</th>
                <th>Metrics</th>
                <th>Links</th>
              </tr>
            </thead>
            <tbody id="datasets-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script type="module" src="../assets/datasets-page.js"></script>
  </body>
</html>
